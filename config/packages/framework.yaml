framework:
    secret: '%env(APP_SECRET)%'
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
        # Augmenter la durée de session à 30 jours
        cookie_lifetime: 2592000
        gc_maxlifetime: 2592000
    php_errors:
        log: true
